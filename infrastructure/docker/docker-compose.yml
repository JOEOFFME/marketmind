x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://marketmind:marketmind_dev@db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ./../../airflow/dags:/opt/airflow/dags
    - ./../../src:/opt/airflow/project/src
    - ./../../data:/opt/airflow/project/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: marketmind_db
    environment:
      POSTGRES_DB: marketmind
      POSTGRES_USER: marketmind
      POSTGRES_PASSWORD: marketmind_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketmind_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  adminer:
    image: adminer:4
    container_name: marketmind_adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: marketmind_mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install psycopg2-binary -q &&
      mlflow server
      --backend-store-uri postgresql://marketmind:marketmind_dev@db:5432/marketmind
      --artifacts-destination /tmp/mlflow/artifacts --serve-artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      --cors-allowed-origins '*'"
    depends_on:
      db:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    container_name: marketmind_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Rime \
          --lastname AABIL \
          --role Admin \
          --email rimeaabil@gmail.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: marketmind_airflow_webserver
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: marketmind_airflow_scheduler
    command: scheduler
    restart: always

  # -- FastAPI service --
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    image: marketmind-api:latest
    container_name: marketmind_api
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://marketmind:marketmind_dev@db:5432/marketmind
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # -- ML worker service --
  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker
    image: marketmind-worker:latest
    container_name: marketmind_worker
    command: ["python", "-m", "src.workers.ml_worker"]
    environment:
      DATABASE_URL: postgresql://marketmind:marketmind_dev@db:5432/marketmind
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/marketmind-success-model@champion
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  prometheus:
    image: prom/prometheus:latest
    container_name: marketmind_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: marketmind_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
  airflow_logs:
  prometheus_data:
  grafana_data: